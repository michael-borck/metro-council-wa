# Metro Council WA — Brief for content generation
# Run: ensayo init --brief brief.yaml --output .

company:
  name: "Metro Council WA"
  slug: "metro-council-wa"
  tagline: "Serving Our Community, Shaping Our Future"
  industry: "managed_it"
  location: "Perth, Western Australia"

  profile:
    founded: 1998
    employees: 320
    revenue: "$95M annually (rates, fees, grants)"
    structure: "Local Government Authority"
    description: |
      A metropolitan local government authority serving a population
      of approximately 85,000 residents across inner and middle
      suburbs of Perth. Responsible for local roads, parks, waste
      management, planning approvals, community facilities, libraries,
      and a growing suite of community development programs. Currently
      undergoing a digital transformation to modernise citizen services
      and internal operations.
    key_facts:
      - "85,000 residents across 12 suburbs"
      - "320 staff (180 indoor, 140 outdoor/operations)"
      - "Annual rates revenue: $62M"
      - "18 parks and reserves maintained"
      - "2 libraries, 3 community centres, 1 aquatic centre"
      - "Processing 2,400+ planning applications per year"
      - "Digital services rollout in progress (70% complete)"
    services:
      - "Local roads and infrastructure maintenance"
      - "Planning and building approvals"
      - "Waste collection and recycling programs"
      - "Parks, recreation, and community facilities"
      - "Library services"
      - "Community development and events"
      - "Environmental sustainability programs"

  scenario:
    type: "transformation"
    name: "Digital First, Community Always"
    description: |
      Metro Council is midway through a major digital transformation,
      moving citizen services online and automating internal processes.
      The project is broadly supported but creating friction between
      digitally confident staff and those who joined council for
      face-to-face community work. Meanwhile, a state government
      directive on housing density is creating intense community
      pushback that is consuming councillor and staff time. The
      council must balance transformation with community trust at
      a moment when both are under pressure.
    key_tensions:
      - "Digital efficiency vs. personal community service"
      - "State housing density directive vs. local community opposition"
      - "Staff digital capability gaps vs. transformation timeline"
      - "Rate increases vs. service expectations"
      - "Elected councillors' priorities vs. operational realities"
      - "Aging infrastructure vs. new digital investments"

